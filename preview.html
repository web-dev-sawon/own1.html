<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simple Hero Section</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family: Arial, sans-serif;
}

/* Navbar */

nav{
    position:absolute;
    top:0;
    width:100%;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:20px 50px;
}

.logo{
    color:white;
    font-size:24px;
    font-weight:bold;
}

nav ul{
    list-style:none;
    display:flex;
}

nav ul li{
    margin-left:20px;
}

nav ul li a{
    text-decoration:none;
    color:white;
    font-size:16px;
}

/* Hero */

.hero{
    height:100vh;
    background:linear-gradient(rgba(0,0,0,0.5),rgba(0,0,0,0.5)),
    url("https://images.unsplash.com/photo-1498050108023-c5249f4df085");
    background-size:cover;
    background-position:center;
    display:flex;
    justify-content:center;
    align-items:center;
    text-align:center;
    color:white;
}

.hero-content h1{
    font-size:48px;
    margin-bottom:10px;
}

.hero-content p{
    font-size:18px;
    margin-bottom:20px;
}

.btn{
    padding:12px 25px;
    background:#ff4c60;
    color:white;
    text-decoration:none;
    border-radius:5px;
}

</style>

</head>
<body>

<section class="hero">

<!-- Navbar -->
<nav>
<div class="logo">MySite</div>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Service</a></li>
<li><a href="#">Contact</a></li>
</ul>
</nav>

<div class="hero-content">
<h1>Welcome to My Website</h1>
<p>Learn Web Development Easily</p>
<a href="#" class="btn">Get Started</a>
</div>

</section>

</body>
</html>
